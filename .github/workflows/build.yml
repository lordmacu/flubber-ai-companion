name: Build Flubber

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: swiftc --version

      - name: Build (.app, firma ad-hoc en CI)
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Zip app
        run: ditto -c -k --keepParent Flubber.app Flubber.app.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Flubber-macos
          path: Flubber.app.zip
          if-no-files-found: error

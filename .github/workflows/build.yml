name: Build Flubber

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write          # necesario para publicar Releases

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: swiftc --version

      - name: Build Flubber.app (firma ad-hoc en CI)
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Zip .app
        run: ditto -c -k --keepParent Flubber.app Flubber.app.zip

      # DMG con la pantalla de instalación (arrastrar a Applications).
      # CI=true ya viene definido por GitHub Actions → make-dmg.sh usa el modo
      # --prebuilt (reutiliza dmg/DS_Store, sin Finder).
      - name: Build Flubber.dmg
        run: |
          chmod +x make-dmg.sh
          ./make-dmg.sh --prebuilt

      # Artefactos descargables en CADA build (pestaña Actions → run → Artifacts)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Flubber-macos
          path: |
            Flubber.dmg
            Flubber.app.zip
          if-no-files-found: error

      # Si es un tag vX.Y.Z, publica un Release con el .dmg y el .zip
      - name: Publish Release (solo en tags v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Flubber.dmg
            Flubber.app.zip
          generate_release_notes: true

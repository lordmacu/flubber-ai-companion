name: Flubber Windows port

on:
  push:
    branches: [ main, master ]
    paths: [ 'windows/**', '.github/workflows/windows-build.yml' ]
  pull_request:
    paths: [ 'windows/**' ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  core:
    name: Build Core (portable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore + build Flubber.Core
        run: dotnet build windows/Flubber.Core/Flubber.Core.csproj -c Release

  app:
    name: Build WPF app (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore + build Flubber.App
        run: dotnet build windows/Flubber.App/Flubber.App.csproj -c Release

      - name: Publish (win-x64, self-contained)
        run: dotnet publish windows/Flubber.App/Flubber.App.csproj -c Release -r win-x64 --self-contained true -o publish

      - name: Zip
        run: Compress-Archive -Path publish/* -DestinationPath Flubber-win-x64.zip

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: Flubber-windows
          path: Flubber-win-x64.zip
          if-no-files-found: error

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DAppSrc="$PWD\publish" /DOutDir="$PWD" windows\installer\Flubber.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Flubber-installer
          path: Flubber-Setup.exe
          if-no-files-found: error

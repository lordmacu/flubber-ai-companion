name: Flubber Windows release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write          # para adjuntar al Release

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish (win-x64, self-contained)
        run: dotnet publish windows/Flubber.App/Flubber.App.csproj -c Release -r win-x64 --self-contained true -o publish

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          if (-not $ver) { $ver = "1.0.0" }
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DAppSrc="$PWD\publish" /DOutDir="$PWD" /DAppVersion="$ver" windows\installer\Flubber.iss

      - name: Zip portable build
        run: Compress-Archive -Path publish/* -DestinationPath Flubber-win-x64.zip

      - name: Attach to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Flubber-Setup.exe
            Flubber-win-x64.zip
